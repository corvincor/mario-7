<!doctype html>
<html>

<head>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0">
    <a-scene embedded arjs>
        <a-assets>
            <img id="brick"
                src="https://cdn.jsdelivr.net/gh/aframevr/sample-assets/assets/images/bricks/brick_bump.jpg" />
        </a-assets>

        <a-marker type="pattern" url="pattern-super-mario.patt">
            <a-entity scale="0.2 0.2 0.2">
                <a-box position="0 2 0" width="8" height="4" depth="4" src="#brick"></a-box>

                <a-cylinder position="-4 3 2" radius="1" height="6" src="#brick"></a-cylinder>
                <a-cylinder position="4 3 2" radius="1" height="6" src="#brick"></a-cylinder>
                <a-cylinder position="-4 3 -2" radius="1" height="6" src="#brick"></a-cylinder>
                <a-cylinder position="4 3 -2" radius="1" height="6" src="#brick"></a-cylinder>

                <a-cone position="-4 7 2" radius-bottom="1.4" height="2" color="red"></a-cone>
                <a-cone position="4 7 2" radius-bottom="1.4" height="2" color="red"></a-cone>
                <a-cone position="-4 7 -2" radius-bottom="1.4" height="2" color="red"></a-cone>
                <a-cone position="4 7 -2" radius-bottom="1.4" height="2" color="red"></a-cone>

                <a-cylinder position="0 7 0" radius="0.05" height="6" color="gray"></a-cylinder>

                <a-entity position="0 4 0" animation="property:position; from:0 4 0; to:0 9 0; dur:4000">
                    <a-plane width="4" height="1.5" color="red" position="2 0 0"
                        animation="property:rotation; from:0 0 -8; to:0 0 8; dur:500; dir:alternate; loop:true"></a-plane>

                    <a-text value="Thank You Mario But Our Princess Is in Another Castle" width="5" align="center"
                        color="white" position="2 0 .1">
                    </a-text>
                </a-entity>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>

</html>
